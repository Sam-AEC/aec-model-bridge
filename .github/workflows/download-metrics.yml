name: Update Download Metrics

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: download-metrics
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Update release download metrics
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/update-download-metrics.ps1

      - name: Commit changed metrics
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Download metrics are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics/downloads.json assets/downloads-*.svg
          git commit -m "Update release download metrics"
          git push
