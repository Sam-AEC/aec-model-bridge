name: Build GitHub Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        default: 1.0.2
      revit_version:
        description: Revit version to package
        required: true
        default: "2027"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install Python build tools
        shell: pwsh
        run: |
          python -m pip install --upgrade build pytest
          python -m pip install -e packages/mcp-server-revit

      - name: Run Python tests
        shell: pwsh
        run: python -m pytest packages/mcp-server-revit/tests

      - name: Build release artifacts
        shell: pwsh
        run: >
          ./scripts/build-release.ps1
          -Version "${{ inputs.version }}"
          -RevitVersion "${{ inputs.revit_version }}"

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "v${{ inputs.version }}"
          dist/release/*
          --title "AEC Model Bridge v${{ inputs.version }}"
          --generate-notes
          --target "${{ github.sha }}"
