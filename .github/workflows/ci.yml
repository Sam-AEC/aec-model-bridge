name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "packages/mcp-server-revit[dev]"

      - name: Run Python tests
        shell: pwsh
        run: python -m pytest packages/mcp-server-revit/tests

      - name: Validate repository metadata
        shell: pwsh
        run: |
          Get-Content server.json -Raw | ConvertFrom-Json | Out-Null
          Get-Content packages/mcp-server-revit/manifest.json -Raw | ConvertFrom-Json | Out-Null
          Get-Content .vscode/mcp.json -Raw | ConvertFrom-Json | Out-Null
          [xml](Get-Content packages/revit-bridge-addin/src/UI/ModernDialog.xaml -Raw) | Out-Null

  addin:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        revit-version:
          - "2024"
          - "2025"
          - "2026"
          - "2027"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Build add-in
        shell: pwsh
        run: ./scripts/build-addin.ps1 -RevitVersion "${{ matrix.revit-version }}" -Configuration Release
