name: Publish MCP Server

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Synchronize release artifact metadata
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          asset="aec-model-bridge-${version}.mcpb"
          gh release download "$GITHUB_REF_NAME" --pattern "$asset" --dir release
          sha256="$(sha256sum "release/$asset" | cut -d' ' -f1)"
          python - "$version" "$sha256" <<'PY'
          import json
          import sys
          from pathlib import Path

          version, sha256 = sys.argv[1:]
          path = Path("server.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          data["version"] = version
          package = data["packages"][0]
          package["version"] = version
          package["identifier"] = (
              "https://github.com/Sam-AEC/aec-model-bridge/"
              f"releases/download/v{version}/aec-model-bridge-{version}.mcpb"
          )
          package["fileSha256"] = sha256
          path.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
