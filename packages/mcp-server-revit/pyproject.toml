[project]
name = "aec-model-bridge"
version = "1.1.0"
description = "Independent Model Context Protocol integration for Autodesk Revit software"
readme = "README.md"
requires-python = ">=3.11"
license = "PolyForm-Small-Business-1.0.0"
license-files = ["LICENSE", "NOTICE", "LICENSING.md", "LICENSES/*"]
authors = [
    { name = "Sam-AEC" },
]
keywords = ["mcp", "revit", "autodesk", "bim", "ai"]
dependencies = [
    "pydantic>=2.5",
    "pydantic-settings>=1.3",
    "httpx>=0.24",
    "python-dotenv>=1.0",
    "mcp>=0.9.0",
]

[project.scripts]
aec-model-bridge = "revit_mcp_server.mcp_server:run_mcp_server"
revit-mcp-server = "revit_mcp_server.mcp_server:run_mcp_server"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.0",
    "mypy>=1.8",
]

[project.urls]
Homepage = "https://github.com/Sam-AEC/aec-model-bridge"
Repository = "https://github.com/Sam-AEC/aec-model-bridge"
Issues = "https://github.com/Sam-AEC/aec-model-bridge/issues"

[build-system]
requires = ["setuptools>=77", "wheel"]
build-backend = "setuptools.build_meta"
